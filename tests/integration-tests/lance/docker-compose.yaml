services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lakekeeper
      POSTGRES_PASSWORD: lakekeeper
      POSTGRES_DB: lakekeeper
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper"]
      interval: 3s
      timeout: 5s
      retries: 10

  minio:
    # Pinned to match the version used in tests/docker-compose.yaml et al.
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 3s
      timeout: 5s
      retries: 10

  create-bucket:
    # Pinned to a stable mc release; bump together with the minio server above
    # to keep server/client features in sync.
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set myminio http://minio:9000 minioadmin minioadmin &&
        mc mb myminio/lance-test --ignore-existing &&
        echo 'Bucket lance-test created'

  lakekeeper-migrate:
    image: ${LAKEKEEPER_TEST__SERVER_IMAGE:-lakekeeper-generic-table-poc}
    command: migrate
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@postgres:5432/lakekeeper
    depends_on:
      postgres:
        condition: service_healthy

  lakekeeper:
    image: ${LAKEKEEPER_TEST__SERVER_IMAGE:-lakekeeper-generic-table-poc}
    command: serve
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@postgres:5432/lakekeeper
      LAKEKEEPER__AUTHZ_BACKEND: allowall
      LAKEKEEPER__LISTEN_PORT: 8181
    ports:
      - "8181:8181"
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      create-bucket:
        condition: service_completed_successfully
