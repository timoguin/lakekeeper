# Nginx config that splits S3 and STS traffic into two ports.
# Port 8080: S3-only — blocks STS AssumeRole requests.
# Port 8081: Full proxy — allows all requests including STS.
#
# This proves that Lakekeeper's sts-endpoint setting actually routes
# STS calls to the correct endpoint.

upstream minio {
    server minio:9000;
}

# Port 8080: S3-only proxy.
# Returns 403 for STS AssumeRole calls so that tests fail if the
# sts-endpoint override is not working.
server {
    listen 8080;

    # Block STS AssumeRole requests.
    # MinIO STS uses POST with ?Action=AssumeRole in the query string.
    if ($args ~* "Action=AssumeRole") {
        return 403 "STS blocked on S3-only endpoint";
    }

    location /health {
        return 200 "ok";
    }

    location / {
        proxy_pass http://minio;
        # Use $http_host (not $host) to preserve the port — S3 signature
        # verification requires the Host header to match what the client signed.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        # Required for large uploads
        client_max_body_size 100m;
    }
}

# Port 8081: Full proxy — allows everything including STS.
server {
    listen 8081;

    location / {
        proxy_pass http://minio;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        client_max_body_size 100m;
    }
}
