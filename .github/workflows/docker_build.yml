name: Docker Build

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to build for (e.g., amd64)'
        required: false
        type: string
        default: 'amd64'
      dockerfile:
        description: 'Path to the Dockerfile'
        required: false
        type: string
        default: 'docker/full.Dockerfile'
      image_name:
        description: 'Name of the image to build'
        required: false
        type: string
        default: 'lakekeeper-local'

jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Docker info
        run: docker info

      # The full image build (Rust compile + image layers + the `docker save`
      # tar) can exhaust the ~14 GB free on hosted runners, failing with
      # "no space left on device". Reclaim preinstalled toolchains we don't use.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          docker-images: false # we build and save Docker images in this job
          large-packages: false # apt purge is slow; the toolchain dirs free enough

      - name: Build Docker image (${{ inputs.platform }})
        run: |
          DOCKER_BUILDKIT=1 docker build --build-arg NO_CHEF=true -t localhost/${{ inputs.image_name }}:${{ inputs.platform }} \
          -f ${{ inputs.dockerfile }} .
          docker save -o /tmp/${{ inputs.image_name }}-${{ inputs.platform }}.tar localhost/${{ inputs.image_name }}:${{ inputs.platform }}

      - name: Save Docker
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lakekeeper-image
          path: /tmp/*.tar
