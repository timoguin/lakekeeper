name: AuthZ Unittests

on:
  push:
    branches:
      - main
      - "rel-*"
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read # Needed to checkout code

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  openfga:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install FGA CLI
        run: |
          wget https://github.com/openfga/cli/releases/download/v0.7.8/fga_0.7.8_linux_amd64.deb
          sudo apt-get install -yqq ./fga_0.7.8_linux_amd64.deb

      - name: Validate Collaboration Model
        run: |
          BASE_PATH=authz/openfga
          LAST_VERSION=$(ls $BASE_PATH | sort -r | head -n 1)
          VALIDATION_OUTPUT=$(fga model validate --file $BASE_PATH/$LAST_VERSION/fga.mod)
          echo $VALIDATION_OUTPUT | jq -e '.is_valid == true' > /dev/null || { echo "Validation failed"; exit 1; }

      - name: Test Collaboration Model
        run: |
          BASE_PATH=authz/openfga
          LAST_VERSION=$(ls $BASE_PATH | sort -r | head -n 1)
          fga model test --tests $BASE_PATH/$LAST_VERSION/store.fga.yaml

      - name: Check json up-to-date
        run: |
          BASE_PATH=authz/openfga
          LAST_VERSION=$(ls $BASE_PATH | sort -r | head -n 1)
          DESIRED_SCHEMA_JSON=$(fga model transform --file $BASE_PATH/$LAST_VERSION/fga.mod)
          CURRENT_SCHEMA_JSON=$(cat $BASE_PATH/$LAST_VERSION/schema.json)
          echo $DESIRED_SCHEMA_JSON | jq -e '. == '"$CURRENT_SCHEMA_JSON" > /dev/null || { echo "Schema json is not up-to-date"; exit 1; }

  opa-bridge:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: authz/opa-bridge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@950f159a49aa91f9323f36f1de81c7f6b5de9576 # v2.3.0
        with:
          version: 1.10.1

      - name: Setup Regal
        uses: styrainc/setup-regal@33a142b1189004e0f14bf42b15972c67eecce776 # v1.0.0

      - name: OPA Check (strict)
        run: opa check --strict policies/

      - name: OPA Format Check
        run: opa fmt --diff --fail policies/ tests/

      - name: OPA Test
        run: opa test policies/ tests/ -v

      - name: Regal Lint
        run: regal lint policies/
