name: integration tests (formats)

on:
  push:
    branches:
      - main
      - "manual-release-*"
      - "rel-*"
  pull_request:
    branches:
      - main
      - "manual-release-*"
      - "rel-*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  docker:
    uses: ./.github/workflows/docker_build.yml
    with:
      platform: "amd64"
      dockerfile: "docker/full-debug.Dockerfile"
      image_name: "lakekeeper-local"
  lance:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Restore binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lakekeeper-image
          path: artifacts
      - name: Restore Docker image
        run: docker load -i artifacts/lakekeeper-local-amd64.tar
      - name: Test Lance Generic Table API
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: cd tests/integration-tests/lance && bash run.sh
        env:
          LAKEKEEPER_TEST__SERVER_IMAGE: localhost/lakekeeper-local:amd64
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@2741064ab9d7af54b0b1ffb6076cf64c16f0220e # v2.2.2
