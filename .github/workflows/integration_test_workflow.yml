name: integration test workflow

on:
  workflow_call:
    inputs:
      test_name:
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read # Needed to checkout code

jobs:
  test:
    name: ${{ inputs.test_name }}
    env:
      current_test: ${{ inputs.test_name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Restore binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lakekeeper-image
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -Rlh artifacts

      - name: Restore Docker image
        run: |
          docker load -i artifacts/lakekeeper-local-amd64.tar

      - name: Test ${{ inputs.test_name }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          max_attempts: 2
          timeout_minutes: 25
          # run.sh auto-selects the Spark image and docker-compose overlays
          # based on the test name / Iceberg version suffix.
          command: cd tests && bash run.sh ${current_test}
        env:
          LAKEKEEPER_TEST__SERVER_IMAGE: localhost/lakekeeper-local:amd64
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_FILESYSTEM: ${{ secrets.AZURE_STORAGE_FILESYSTEM }}
          GCS_CREDENTIAL: ${{ secrets.GCS_CREDENTIAL }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          LAKEKEEPER_TEST__AWS_S3_BUCKET: ${{ secrets.LAKEKEEPER_TEST__AWS_S3_BUCKET }}
          LAKEKEEPER_TEST__AWS_S3_REGION: ${{ secrets.LAKEKEEPER_TEST__AWS_S3_REGION }}
          LAKEKEEPER_TEST__AWS_S3_ACCESS_KEY_ID: ${{ secrets.LAKEKEEPER_TEST__AWS_S3_ACCESS_KEY_ID }}
          LAKEKEEPER_TEST__AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.LAKEKEEPER_TEST__AWS_S3_SECRET_ACCESS_KEY }}
          LAKEKEEPER_TEST__AWS_S3_STS_ROLE_ARN: ${{ secrets.LAKEKEEPER_TEST__AWS_S3_STS_ROLE_ARN }}
      - name: Dump DB
        if: always()
        uses: tj-actions/pg-dump@f68d6b3b0a96a30fda60109a19a5d9fb3c536c9c
        with:
          database_url: "postgresql://postgres:postgres@localhost:31102/postgres"
          postgresql_version: "17"
          path: dump.sql
      - name: compress
        if: always()
        run: cat dump.sql | gzip -9 > dump.sql.gz
      - name: Upload dump
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: db-dump-${{ inputs.test_name }}
          path: dump.sql.gz
      - name: Dump docker logs on failure
        if: always()
        uses: jwalton/gh-docker-logs@2741064ab9d7af54b0b1ffb6076cf64c16f0220e # v2.2.2
